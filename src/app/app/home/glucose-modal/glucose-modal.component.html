<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
    <ion-title>{{ record ? 'Editar' : 'Nuevo' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="confirm()" [strong]="true">Guardar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <ion-item>
    <ion-input
      label="Nivel (mg/dL)"
      labelPlacement="floating"
      type="number"
      [(ngModel)]="formData.value"
      placeholder="Ej: 100">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Fecha"
      labelPlacement="stacked"
      type="date"
      [(ngModel)]="formData.date">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Hora"
      labelPlacement="stacked"
      type="time"
      [(ngModel)]="formData.time">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-select label="Contexto" labelPlacement="floating" [(ngModel)]="formData.context">
      <ion-select-option *ngFor="let c of contexts" [value]="c.value">
        {{ c.label }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-textarea
      label="Notas"
      labelPlacement="floating"
      [(ngModel)]="formData.notes"
      rows="3">
    </ion-textarea>
  </ion-item>

</ion-content>
